@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

/* HEADER */
#header { display:flex; align-items:center; justify-content:space-between; padding:20px 28px; border-bottom:1px solid rgba(255,255,255,0.06); position:relative; z-index:50; }
#atlas-label { font-size:10px; letter-spacing:6px; color:rgba(255,255,255,0.22); text-transform:uppercase; font-family:monospace; }
#header-right { display:flex; align-items:center; gap:14px; }
#counter { color:rgba(255,255,255,0.18); font-family:monospace; font-size:11px; letter-spacing:2px; }

/* DROPDOWN */
#dd-wrap { position:relative; }
#dd-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.16); color:rgba(255,255,255,0.6); padding:7px 14px; font-family:monospace; font-size:11px; letter-spacing:2px; cursor:pointer; border-radius:3px; text-transform:uppercase; display:flex; align-items:center; gap:7px; outline:none; }
#dd-btn:hover { background:rgba(255,255,255,0.12); }
#dd-arrow { display:inline-block; transition:transform 0.25s; }
#dd-menu { display:none; position:absolute; top:calc(100% + 8px); right:0; background:rgba(5,12,5,0.97); border:1px solid rgba(255,255,255,0.1); border-radius:4px; min-width:220px; max-height:360px; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,0.9); z-index:100; }
#dd-menu.open { display:block; }
#dd-menu::-webkit-scrollbar { width:4px; }
#dd-menu::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
.dd-item { display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:10px 16px; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.45); font-family:monospace; font-size:11px; cursor:pointer; outline:none; }
.dd-item:hover { background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.95); }
.dd-item.active { background:rgba(255,255,255,0.08); color:white; }
.dd-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; opacity:0.85; }

/* CARD */
#card { max-width:1100px; margin:0 auto; padding:32px 24px 100px; animation:fadeIn 0.45s ease; }
#card.fade-out { opacity:0; transform:translateY(16px); transition:opacity 0.3s ease, transform 0.3s ease; }

/* Status + title */
#title-block { margin-bottom:24px; }
#status-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
#status-badge { display:inline-flex; align-items:center; gap:7px; padding:4px 12px 4px 8px; background:rgba(0,0,0,0.35); border-radius:100px; }
#status-dot { width:7px; height:7px; border-radius:50%; animation:pulse 2.4s ease infinite; }
#status-text { font-family:monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; }
#region-text { color:rgba(255,255,255,0.25); font-family:monospace; font-size:11px; }
#tagline { font-size:12px; color:rgba(255,255,255,0.32); font-style:italic; margin-bottom:6px; }
#species-name { font-size:clamp(36px,6vw,68px); font-weight:normal; color:white; line-height:0.95; letter-spacing:-1.5px; }
#sci-name { font-size:15px; color:rgba(255,255,255,0.32); font-style:italic; margin-top:6px; }

/* PHOTOS */
#photos { display:flex; gap:12px; margin-bottom:24px; }
.photo-card { flex:1; min-width:0; border-radius:6px; overflow:hidden; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); position:relative; aspect-ratio:4/3; }
.photo-card img { width:100%; height:100%; object-fit:cover; display:block; opacity:0; transition:opacity 0.6s ease; }
.photo-card img.loaded { opacity:1; }
.photo-spinner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.spinner { width:28px; height:28px; border:2px solid rgba(255,255,255,0.08); border-top:2px solid rgba(255,255,255,0.4); border-radius:50%; animation:spin 0.9s linear infinite; }
.photo-error { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:rgba(255,255,255,0.2); font-family:monospace; font-size:11px; }
.photo-label { position:absolute; bottom:0; left:0; right:0; padding:22px 12px 10px; background:linear-gradient(to top,rgba(0,0,0,0.7),transparent); font-family:monospace; font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.5); text-transform:uppercase; }

/* STATS */
#stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; margin-bottom:16px; }
.stat-cell { background:rgba(10,18,10,0.9); padding:14px 18px; }
.stat-label { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.28); text-transform:uppercase; font-family:monospace; margin-bottom:5px; }
.stat-value { font-size:13px; color:rgba(255,255,255,0.82); }

/* INFO BOXES */
#info-boxes { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.info-box { flex:1; min-width:200px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:14px 16px; }
.info-box-label { font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.28); font-family:monospace; text-transform:uppercase; margin-bottom:7px; }
.info-box-text { font-size:13px; color:rgba(255,255,255,0.7); line-height:1.7; }

/* THREATS */
#threats { display:flex; gap:8px; flex-wrap:wrap; }
.threat-tag { background:rgba(255,55,55,0.1); border:1px solid rgba(255,55,55,0.2); color:rgba(255,150,150,0.85); padding:4px 13px; font-family:monospace; font-size:10px; border-radius:2px; letter-spacing:0.5px; }

/* SHUFFLE */
#shuffle-wrap { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:20; display:flex; flex-direction:column; align-items:center; gap:6px; }
#shuffle-btn { background:rgba(20,35,20,0.88); border:1px solid rgba(255,255,255,0.22); color:white; width:54px; height:54px; border-radius:50%; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:all 0.2s ease; box-shadow:0 8px 32px rgba(0,0,0,0.7); outline:none; backdrop-filter:blur(16px); }
#shuffle-btn:hover { background:rgba(255,255,255,0.16); transform:scale(1.07); }
#shuffle-btn:active { transform:scale(0.94); }
#shuffle-label { color:rgba(255,255,255,0.2); font-family:monospace; font-size:9px; letter-spacing:4px; text-transform:uppercase; }

    var STATUS_COLORS = {
      "Critically Endangered": { color:"#ff4d4d", glow:"rgba(255,77,77,0.5)" },
      "Endangered":            { color:"#ffaa00", glow:"rgba(255,170,0,0.5)"  },
      "Vulnerable":            { color:"#44aaff", glow:"rgba(68,170,255,0.5)" }
    };

    var currentIdx = Math.floor(Math.random() * SPECIES.length);
    var usedIdx = [currentIdx];

    function setupImage(imgEl, spinnerEl, errorEl, src) {
      imgEl.classList.remove('loaded');
      errorEl.style.display = 'none';
      spinnerEl.style.display = 'flex';
      imgEl.onload = function() {
        spinnerEl.style.display = 'none';
        imgEl.classList.add('loaded');
      };
      imgEl.onerror = function() {
        spinnerEl.style.display = 'none';
        errorEl.style.display = 'flex';
      };
      imgEl.src = src;
    }

    function render(idx, animate) {
      var s = SPECIES[idx];
      var st = STATUS_COLORS[s.status] || STATUS_COLORS["Endangered"];
      var card = document.getElementById('card');

      if (animate) {
        card.style.animation = 'none';
        card.offsetHeight; // reflow
        card.style.animation = 'fadeIn 0.45s ease';
      }

      // Counter
      document.getElementById('counter').textContent = (idx + 1) + ' / ' + SPECIES.length;

      // Status badge
      var badge = document.getElementById('status-badge');
      badge.style.border = '1px solid ' + st.color + '40';
      var dot = document.getElementById('status-dot');
      dot.style.background = st.color;
      dot.style.boxShadow = '0 0 10px ' + st.glow;
      var statusText = document.getElementById('status-text');
      statusText.textContent = s.status;
      statusText.style.color = st.color;

      document.getElementById('region-text').textContent = s.region;
      document.getElementById('tagline').textContent = s.tagline;
      document.getElementById('species-name').textContent = s.name;
      document.getElementById('sci-name').textContent = s.sci;

      // Photos
      setupImage(
        document.getElementById('img-adult'),
        document.querySelector('#photo-adult .photo-spinner'),
        document.getElementById('err-adult'),
        s.adult
      );
      setupImage(
        document.getElementById('img-baby'),
        document.querySelector('#photo-baby .photo-spinner'),
        document.getElementById('err-baby'),
        s.baby
      );

      // Stats
      document.getElementById('stat-pop').textContent    = s.pop;
      document.getElementById('stat-life').textContent   = s.life;
      document.getElementById('stat-weight').textContent = s.weight;
      document.getElementById('stat-diet').textContent   = s.diet;

      // Info
      document.getElementById('info-habitat').textContent = s.habitat;
      document.getElementById('info-fact').textContent    = s.fact;

      // Threats
      var threatsEl = document.getElementById('threats');
      threatsEl.innerHTML = '';
      for (var i = 0; i < s.threats.length; i++) {
        var tag = document.createElement('span');
        tag.className = 'threat-tag';
        tag.textContent = s.threats[i];
        threatsEl.appendChild(tag);
      }

      // Update dropdown active state
      var items = document.querySelectorAll('.dd-item');
      for (var j = 0; j < items.length; j++) {
        items[j].classList.toggle('active', j === idx);
      }

      currentIdx = idx;
    }

    function buildDropdown() {
      var menu = document.getElementById('dd-menu');
      menu.innerHTML = '';
      for (var i = 0; i < SPECIES.length; i++) {
        (function(i) {
          var sp = SPECIES[i];
          var st = STATUS_COLORS[sp.status] || STATUS_COLORS["Endangered"];
          var btn = document.createElement('button');
          btn.className = 'dd-item';
          var dot = document.createElement('span');
          dot.className = 'dd-dot';
          dot.style.background = st.color;
          var label = document.createTextNode(sp.name);
          btn.appendChild(dot);
          btn.appendChild(label);
          btn.onclick = function() {
            render(i, true);
            closeDropdown();
          };
          menu.appendChild(btn);
        })(i);
      }
    }

    function openDropdown() {
      document.getElementById('dd-menu').classList.add('open');
      document.getElementById('dd-arrow').style.transform = 'rotate(180deg)';
    }
    function closeDropdown() {
      document.getElementById('dd-menu').classList.remove('open');
      document.getElementById('dd-arrow').style.transform = 'rotate(0deg)';
    }

    document.getElementById('dd-btn').onclick = function() {
      var menu = document.getElementById('dd-menu');
      if (menu.classList.contains('open')) { closeDropdown(); } else { openDropdown(); }
    };

    document.addEventListener('mousedown', function(e) {
      var wrap = document.getElementById('dd-wrap');
      if (!wrap.contains(e.target)) closeDropdown();
    });

    document.getElementById('shuffle-btn').onclick = function() {
      var pool = [];
      for (var i = 0; i < SPECIES.length; i++) {
        if (usedIdx.indexOf(i) === -1) pool.push(i);
      }
      if (pool.length === 0) {
        usedIdx = [currentIdx];
        for (var i = 0; i < SPECIES.length; i++) {
          if (i !== currentIdx) pool.push(i);
        }
      }
      var next = pool[Math.floor(Math.random() * pool.length)];
      usedIdx.push(next);
      render(next, true);
    };

    // Init
    buildDropdown();
    render(currentIdx, false);
  </script>

</body>
</html>
