  {

  },
];

const STATUS_CONFIG = {
  "Critically Endangered": { color: "#ff4d4d", glow: "rgba(255,77,77,0.5)" },
  "Endangered":            { color: "#ffaa00", glow: "rgba(255,170,0,0.5)"  },
  "Vulnerable":            { color: "#44aaff", glow: "rgba(68,170,255,0.5)" },
};

// Fetch adult + juvenile photos from iNaturalist taxa API (open CORS)
async function fetchPhotos(taxonId) {
  try {
    const res = await fetch(`https://api.inaturalist.org/v1/taxa/${taxonId}`);
    const data = await res.json();
    const taxon = data.results[0];
    const photos = taxon?.taxon_photos || [];
    // Get first two distinct photos
    const urls = photos.slice(0, 6).map(p => {
      const url = p.photo?.medium_url || p.photo?.url;
      return url ? url.replace("square", "medium") : null;
    }).filter(Boolean);
    return { adult: urls[0] || null, baby: urls[1] || urls[0] || null };
  } catch(e) {
    return { adult: null, baby: null };
  }
}

function PhotoCard({ src, label }) {
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(false);

  useEffect(() => { setLoaded(false); setError(false); }, [src]);

  return (
    <div style={{
      flex: 1, minWidth: 0, borderRadius: "6px", overflow: "hidden",
      background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)",
      position: "relative", aspectRatio: "4/3"
    }}>
      {/* Spinner */}
      {!loaded && !error && src && (
        <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ width: "28px", height: "28px", border: "2px solid rgba(255,255,255,0.08)", borderTop: "2px solid rgba(255,255,255,0.4)", borderRadius: "50%", animation: "spin 0.9s linear infinite" }} />
        </div>
      )}
      {/* No photo fallback */}
      {(!src || error) && (
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "8px", color: "rgba(255,255,255,0.2)", fontFamily: "monospace", fontSize: "11px" }}>
          <span style={{ fontSize: "32px" }}>🐾</span>
          {label}
        </div>
      )}
      {/* Photo */}
      {src && (
        <img src={src} alt={label}
          onLoad={() => setLoaded(true)}
          onError={() => { setError(true); setLoaded(true); }}
          style={{ width: "100%", height: "100%", objectFit: "cover", opacity: loaded ? 1 : 0, transition: "opacity 0.6s ease", display: "block" }}
        />
      )}
      {/* Label */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "22px 12px 10px", background: "linear-gradient(to top, rgba(0,0,0,0.7), transparent)", fontFamily: "monospace", fontSize: "10px", letterSpacing: "3px", color: "rgba(255,255,255,0.5)", textTransform: "uppercase" }}>
        {label}
      </div>
    </div>
  );
}

function App() {
  const [index, setIndex] = useState(() => Math.floor(Math.random() * SPECIES.length));
  const [animIn, setAnimIn] = useState(true);
  const [dropdownOpen, setDropdownOpen] = useState(false);
  const [photos, setPhotos] = useState({ adult: null, baby: null });
  const [photosLoading, setPhotosLoading] = useState(true);
  const usedRef = useRef([index]);
  const dropdownRef = useRef(null);

  const species = SPECIES[index];
  const status = STATUS_CONFIG[species.status] || STATUS_CONFIG["Endangered"];

  // Load photos whenever species changes
  useEffect(() => {
    setPhotosLoading(true);
    setPhotos({ adult: null, baby: null });
    fetchPhotos(species.taxonId).then(p => {
      setPhotos(p);
      setPhotosLoading(false);
    });
  }, [index]);

  const transition = (newIndex) => {
    setAnimIn(false);
    setTimeout(() => {
      setIndex(newIndex);
      setDropdownOpen(false);
      setTimeout(() => setAnimIn(true), 60);
    }, 300);
  };

  const handleShuffle = () => {
    let pool = SPECIES.map((_, i) => i).filter(i => !usedRef.current.includes(i));
    if (pool.length === 0) { usedRef.current = [index]; pool = SPECIES.map((_, i) => i).filter(i => i !== index); }
    const next = pool[Math.floor(Math.random() * pool.length)];
    usedRef.current.push(next);
    transition(next);
  };

  useEffect(() => {
    const h = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setDropdownOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  return (
    <div style={{ width: "100vw", minHeight: "100vh", background: "linear-gradient(160deg, #060d06 0%, #0a120a 50%, #060d06 100%)", fontFamily: "'Palatino Linotype', 'Book Antiqua', Palatino, serif", color: "#e8e0d0", overflowY: "auto" }}>
      <style>{`
        * { box-sizing: border-box; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .shuf:hover { background: rgba(255,255,255,0.16) !important; transform: scale(1.07) !important; }
        .shuf:active { transform: scale(0.94) !important; }
        .dditem:hover { background: rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.95) !important; }
        .dd-scroll::-webkit-scrollbar { width: 4px; }
        .dd-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
      `}</style>

      {/* HEADER */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 28px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ fontSize: "10px", letterSpacing: "6px", color: "rgba(255,255,255,0.22)", textTransform: "uppercase", fontFamily: "monospace" }}>Wildlife Atlas</div>
        <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
          <span style={{ color: "rgba(255,255,255,0.18)", fontFamily: "monospace", fontSize: "11px", letterSpacing: "2px" }}>{index + 1} / {SPECIES.length}</span>
          <div ref={dropdownRef} style={{ position: "relative" }}>
            <button onClick={() => setDropdownOpen(o => !o)} style={{ background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.16)", color: "rgba(255,255,255,0.6)", padding: "7px 14px", fontFamily: "monospace", fontSize: "11px", letterSpacing: "2px", cursor: "pointer", borderRadius: "3px", textTransform: "uppercase", display: "flex", alignItems: "center", gap: "7px", outline: "none" }}>
              Choose Species
              <span style={{ transition: "transform 0.25s", display: "inline-block", transform: dropdownOpen ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
            </button>
            {dropdownOpen && (
              <div className="dd-scroll" style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, background: "rgba(5,12,5,0.97)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "4px", backdropFilter: "blur(24px)", minWidth: "220px", maxHeight: "360px", overflowY: "auto", boxShadow: "0 24px 64px rgba(0,0,0,0.9)", zIndex: 100 }}>
                {SPECIES.map((s, i) => (
                  <button key={s.name} className="dditem" onClick={() => transition(i)} style={{ display: "flex", alignItems: "center", gap: "10px", width: "100%", textAlign: "left", padding: "10px 16px", background: i === index ? "rgba(255,255,255,0.08)" : "transparent", border: "none", borderBottom: "1px solid rgba(255,255,255,0.05)", color: i === index ? "white" : "rgba(255,255,255,0.45)", fontFamily: "monospace", fontSize: "11px", cursor: "pointer", transition: "all 0.15s", outline: "none" }}>
                    <span style={{ width: "6px", height: "6px", borderRadius: "50%", flexShrink: 0, background: (STATUS_CONFIG[s.status] || STATUS_CONFIG["Endangered"]).color, opacity: 0.85 }} />
                    {s.name}
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* CARD */}
      <div style={{ maxWidth: "1100px", margin: "0 auto", padding: "32px 24px 100px", opacity: animIn ? 1 : 0, transform: animIn ? "translateY(0)" : "translateY(16px)", transition: "opacity 0.45s ease, transform 0.45s ease" }}>

        {/* Title */}
        <div style={{ marginBottom: "24px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "8px", flexWrap: "wrap" }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: "7px", padding: "4px 12px 4px 8px", background: "rgba(0,0,0,0.35)", borderRadius: "100px", border: `1px solid ${status.color}40` }}>
              <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: status.color, boxShadow: `0 0 10px ${status.glow}`, animation: "pulse 2.4s ease infinite" }} />
              <span style={{ color: status.color, fontFamily: "monospace", fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase" }}>{species.status}</span>
            </div>
            <span style={{ color: "rgba(255,255,255,0.25)", fontFamily: "monospace", fontSize: "11px" }}>{species.region}</span>
          </div>
          <div style={{ fontSize: "12px", color: "rgba(255,255,255,0.32)", fontStyle: "italic", marginBottom: "6px" }}>{species.tagline}</div>
          <h1 style={{ fontSize: "clamp(36px, 6vw, 68px)", fontWeight: "normal", color: "white", lineHeight: 0.95, letterSpacing: "-1.5px" }}>{species.name}</h1>
          <div style={{ fontSize: "15px", color: "rgba(255,255,255,0.32)", fontStyle: "italic", marginTop: "6px" }}>{species.scientificName}</div>
        </div>

        {/* PHOTOS */}
        <div style={{ display: "flex", gap: "12px", marginBottom: "24px" }}>
          <PhotoCard src={photos.adult} label="Adult" />
          <PhotoCard src={photos.baby}  label="Young" />
        </div>

        {/* STATS */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: "1px", background: "rgba(255,255,255,0.06)", borderRadius: "4px", overflow: "hidden", marginBottom: "16px" }}>
          {[
            { label: "Population", value: species.population },
            { label: "Lifespan",   value: species.lifespan   },
            { label: "Weight",     value: species.weight     },
            { label: "Diet",       value: species.diet       },
          ].map(({ label, value }) => (
            <div key={label} style={{ background: "rgba(10,18,10,0.9)", padding: "14px 18px" }}>
              <div style={{ fontSize: "9px", letterSpacing: "3px", color: "rgba(255,255,255,0.28)", textTransform: "uppercase", fontFamily: "monospace", marginBottom: "5px" }}>{label}</div>
              <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.82)" }}>{value}</div>
            </div>
          ))}
        </div>

        {/* HABITAT + FACT */}
        <div style={{ display: "flex", gap: "12px", flexWrap: "wrap", marginBottom: "16px" }}>
          <div style={{ flex: 1, minWidth: "200px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "4px", padding: "14px 16px" }}>
            <div style={{ fontSize: "9px", letterSpacing: "3px", color: "rgba(255,255,255,0.28)", fontFamily: "monospace", textTransform: "uppercase", marginBottom: "7px" }}>Habitat</div>
            <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.7)", lineHeight: 1.7 }}>{species.habitat}</div>
          </div>
          <div style={{ flex: 1, minWidth: "200px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "4px", padding: "14px 16px" }}>
            <div style={{ fontSize: "9px", letterSpacing: "3px", color: "rgba(255,255,255,0.28)", fontFamily: "monospace", textTransform: "uppercase", marginBottom: "7px" }}>✦ Did you know</div>
            <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.7)", lineHeight: 1.7, fontStyle: "italic" }}>{species.funFact}</div>
          </div>
        </div>

        {/* THREATS */}
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
          {species.threats.map((t, i) => (
            <span key={i} style={{ background: "rgba(255,55,55,0.1)", border: "1px solid rgba(255,55,55,0.2)", color: "rgba(255,150,150,0.85)", padding: "4px 13px", fontFamily: "monospace", fontSize: "10px", borderRadius: "2px", letterSpacing: "0.5px" }}>{t}</span>
          ))}
        </div>
      </div>

      {/* SHUFFLE */}
      <div style={{ position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)", zIndex: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: "6px" }}>
        <button className="shuf" onClick={handleShuffle} style={{ background: "rgba(20,35,20,0.88)", border: "1px solid rgba(255,255,255,0.22)", backdropFilter: "blur(16px)", color: "white", width: "54px", height: "54px", borderRadius: "50%", cursor: "pointer", fontSize: "20px", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s ease", boxShadow: "0 8px 32px rgba(0,0,0,0.7)", outline: "none" }}>⇌</button>
        <span style={{ color: "rgba(255,255,255,0.2)", fontFamily: "monospace", fontSize: "9px", letterSpacing: "4px", textTransform: "uppercase" }}>Shuffle</span>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
